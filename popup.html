<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css" rel="stylesheet">
  <style>
    * { box-sizing: border-box; }

    body {
      width: 260px;
      padding: 12px;
      font-family: 'Noto Sans', sans-serif;
      margin: 0;
      color: #333;
    }

    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 10px;
    }

    .header h1 {
      margin: 0;
      font-size: 15px;
      font-weight: 600;
      color: #111;
    }

    .action-grid {
      display: flex;
      flex-direction: column;
      gap: 5px;
      margin-bottom: 6px;
    }

    .action-btn {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 12px;
      border: 1.5px solid #d1d5db;
      border-radius: 8px;
      background: white;
      cursor: pointer;
      text-align: left;
      transition: all 0.12s;
    }

    .action-btn:hover:not(:disabled) {
      background: #f3f4f6;
      border-color: #9ca3af;
    }

    .action-btn:disabled {
      opacity: 0.45;
      cursor: not-allowed;
    }


    .btn-icon {
      font-size: 22px;
      line-height: 1;
      flex-shrink: 0;
      width: 28px;
      text-align: center;
    }

    .btn-label {
      font-family: 'Noto Sans', sans-serif;
      font-size: 13px;
      font-weight: 500;
      color: #374151;
    }

    #optionsBtn:hover { color: #374151; }

    .status-msg {
      font-family: 'Noto Sans', sans-serif;
      font-size: 11px;
      padding: 7px 9px;
      border-radius: 5px;
      display: none;
      margin-bottom: 6px;
    }
    .status-msg.success { background: #dcfce7; color: #166534; border: 1px solid #bbf7d0; }
    .status-msg.error   { background: #fee2e2; color: #991b1b; border: 1px solid #fecaca; }
    .status-msg.info    { background: #eff6ff; color: #1e40af; border: 1px solid #bfdbfe; }

    .spinner {
      display: inline-block;
      width: 10px; height: 10px;
      border: 2px solid #bfdbfe;
      border-top-color: #2563eb;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-right: 4px;
      vertical-align: middle;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    #flaggedList { display: none; }

    .flagged-item {
      display: flex;
      align-items: center;
      gap: 7px;
      padding: 6px 7px;
      border-radius: 5px;
      background: #f9fafb;
      border: 1px solid #e5e7eb;
      margin-bottom: 4px;
    }

    .flagged-info { flex: 1; min-width: 0; }

    .flagged-title {
      font-size: 11px;
      font-weight: 500;
      color: #111;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .flagged-reason { font-size: 10px; color: #9ca3af; margin-top: 1px; }

    .close-tab-btn {
      background: none;
      border: 1px solid #d1d5db;
      border-radius: 4px;
      color: #9ca3af;
      cursor: pointer;
      font-size: 11px;
      padding: 2px 5px;
      flex-shrink: 0;
      transition: all 0.1s;
    }
    .close-tab-btn:hover { background: #fee2e2; border-color: #fca5a5; color: #dc2626; }

    .close-all-btn {
      width: 100%;
      margin-top: 5px;
      padding: 7px;
      background: #fee2e2;
      border: 1px solid #fca5a5;
      border-radius: 6px;
      color: #dc2626;
      font-family: 'Noto Sans', sans-serif;
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.12s;
    }
    .close-all-btn:hover { background: #fecaca; }

    #patternInput {
      width: 100%;
      padding: 7px 10px;
      border: 1.5px solid #d1d5db;
      border-radius: 6px;
      font-family: 'Monaco', 'Menlo', 'Ubuntu Mono', monospace;
      font-size: 11px;
      box-sizing: border-box;
      margin-bottom: 6px;
      transition: border-color 0.15s;
      color: #374151;
    }
    #patternInput:focus {
      outline: none;
      border-color: #ec4899;
      box-shadow: 0 0 0 2px rgba(236,72,153,0.12);
    }
    #patternInput::placeholder { color: #bcbcbc; font-family: 'Noto Sans', sans-serif; }

    .empty-msg { font-size: 11px; color: #9ca3af; text-align: center; padding: 6px 0; }
  </style>
</head>
<body>
  <div class="header">
    <h1>Tab Organizer</h1>
    <i class="fa-solid fa-gear" id="optionsBtn" title="Options" style="color:#9ca3af;cursor:pointer;font-size:15px"></i>
  </div>

  <div class="action-grid">
    <button class="action-btn" id="sortActivityBtn">
      <span class="btn-icon"><i class="fa-solid fa-heart-pulse" style="color:#ef4444"></i></span><span class="btn-label">Sort by Activity</span>
    </button>
    <button class="action-btn" id="sortTitleBtn">
      <span class="btn-icon"><i class="fa-solid fa-signature" style="color:#16a34a"></i></span><span class="btn-label">Sort by Title</span>
    </button>
    <button class="action-btn" id="reverseBtn">
      <span class="btn-icon"><i class="fa-solid fa-arrows-up-down" style="color:#2563eb"></i></span><span class="btn-label">Reverse Sort</span>
    </button>
    <button class="action-btn" id="sortTopicBtn">
      <span class="btn-icon"><i class="fa-solid fa-layer-group" style="color:#8b5cf6"></i></span><span class="btn-label">Sort by Topic</span>
    </button>
    <button class="action-btn" id="declutterBtn">
      <span class="btn-icon"><i class="fa-solid fa-hand-sparkles" style="color:#ec4899"></i></span><span class="btn-label">Declutter</span>
    </button>
  </div>

  <input type="text" id="patternInput" placeholder="Type a pattern to preview…" spellcheck="false">

  <div class="status-msg" id="statusMsg"></div>

  <div id="flaggedList">
    <div id="flaggedItems"></div>
    <button class="close-all-btn" id="closeAllBtn" style="display:none">Close All Flagged</button>
  </div>

  <script src="popup.js"></script>
</body>
</html>
